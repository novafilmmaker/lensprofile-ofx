name: Compilar instalador LensProfileOFX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: macos-latest

    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar el proyecto (CMake)
        run: cmake -S . -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Compilar el plugin
        run: cmake --build build --config Release

      - name: Comprimir el bundle para instalar arrastrando en Finder
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent LensProfileOFX.ofx.bundle ../LensProfileOFX.ofx.bundle.zip
          cd ..

      - name: Armar el instalador .pkg (opcional, sin firmar por ahora)
        run: |
          chmod +x installer/build_installer.sh installer/scripts/postinstall
          ./installer/build_installer.sh build/LensProfileOFX.ofx.bundle

      - name: Guardar los archivos como resultado del build
        uses: actions/upload-artifact@v4
        with:
          name: LensProfileOFX-build
          path: |
            LensProfileOFX.ofx.bundle.zip
            LensProfileOFX-Installer.pkg

      - name: Publicar como Release descargable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" \
            LensProfileOFX.ofx.bundle.zip \
            LensProfileOFX-Installer.pkg \
            --title "LensProfileOFX (Fase 1) - build ${{ github.run_number }}" \
            --notes "Usar LensProfileOFX.ofx.bundle.zip por ahora (arrastrar a mano). El .pkg todavia no esta firmado por Apple."
